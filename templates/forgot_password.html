{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-logo">🔑</div>
        <h1>Forgot Password</h1>
        <p class="subtitle">Apni email enter karo, reset link bhej denge</p>

        <form method="POST" action="/forgot_password">
            <input
                type="email"
                name="email"
                placeholder="Email address..."
                autocomplete="off"
                required
                autofocus
            />
            <button type="submit">Reset Link Bhejo →</button>
        </form>

        <p class="switch-auth">
            Yaad aa gaya? <a href="/login">Login karo</a>
        </p>
    </div>
</div>
{% endblock %}

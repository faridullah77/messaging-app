{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-logo">🔒</div>
        <h1>Naya Password Set Karo</h1>
        <p class="subtitle">Apna naya password enter karo</p>

        <form method="POST" action="/reset_password/{{ token }}">
            <input
                type="password"
                name="password"
                placeholder="Naya password..."
                required
                autofocus
                minlength="6"
            />
            <input
                type="password"
                name="confirm_password"
                placeholder="Password confirm karo..."
                required
                minlength="6"
            />
            <button type="submit">Password Reset Karo →</button>
        </form>

        <p class="switch-auth">
            <a href="/login">← Wapas Login pe</a>
        </p>
    </div>
</div>
{% endblock %}
